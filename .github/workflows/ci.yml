name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check
      - run: npm run build --workspace react-native-goodcharts
      - run: npm pack --dry-run --ignore-scripts --workspace react-native-goodcharts
      - run: npm test -- --runInBand
